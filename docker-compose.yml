services:
  # NOTE: No `platform:` flags here.
  #
  # Run ARM64 containers via QEMU on your amd64 host. This works for custom
  # Python images we build (QEMU handles them) but kills pre-built native
  # binaries like ollama/ollama ("exec format error").
  #
  # ARM64 targeting for Pi deploy lives in docker-compose.pi.yml (override).
  # To deploy to Pi: docker compose -f docker-compose.yml -f docker-compose.pi.yml ...

  ollama:
    image: ollama/ollama:latest
    container_name: arka-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    restart: unless-stopped
    healthcheck:
      # ollama/ollama image has no curl/wget — use the ollama binary itself.
      # `ollama list` exits 0 when the server is ready, non-zero otherwise.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  hypervisor:
    # Build context is project root so data/ and config/ are reachable.
    # hypervisor/main.py imports from data.feeds.market_data at runtime —
    # that module lives outside ./hypervisor so ./hypervisor alone is wrong.
    build:
      context: .
      dockerfile: hypervisor/Dockerfile
    container_name: arka-hypervisor
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data/db:/app/data/db
      # Writable .env so /setup/credentials can persist credentials
      - ./.env:/app/.env
      # Docker socket so the hypervisor can restart sibling containers after credential save
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build: ./dashboard
    container_name: arka-dashboard
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker-nautilus:
    build: ./workers/nautilus
    container_name: arka-nautilus
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-prediction-markets:
    build: ./workers/prediction_markets
    container_name: arka-prediction-markets
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8002:8002"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-analyst:
    build: ./workers/analyst
    container_name: arka-analyst
    depends_on:
      # service_started not service_healthy — analyst handles Ollama
      # connection failure gracefully (stub mode, advisory_only=True).
      ollama:
        condition: service_started
    ports:
      - "8003:8003"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-telegram-bot:
    build: ./workers/telegram_bot
    container_name: arka-telegram-bot
    depends_on:
      hypervisor:
        condition: service_healthy
    environment:
      HYPERVISOR_URL: "http://hypervisor:8000"
    env_file: .env
    restart: unless-stopped

  worker-core-dividends:
    build: ./workers/core_dividends
    container_name: arka-core-dividends
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8006:8006"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ollama_data:
