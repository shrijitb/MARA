services:
  # NOTE: No `platform:` flags here.
  #
  # Run ARM64 containers via QEMU on your amd64 host. This works for custom
  # Python images we build (QEMU handles them) but kills pre-built native
  # binaries like ollama/ollama ("exec format error").
  #
  # ARM64 targeting for Pi deploy lives in docker-compose.pi.yml (override).
  # To deploy to Pi: docker compose -f docker-compose.yml -f docker-compose.pi.yml ...

  ollama:
    image: ollama/ollama:0.21.0
    container_name: arca-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    restart: unless-stopped
    healthcheck:
      # ollama/ollama image has no curl/wget — use the ollama binary itself.
      # `ollama list` exits 0 when the server is ready, non-zero otherwise.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Scoped Docker API proxy — exposes only POST /containers/*/restart.
  # The hypervisor calls this instead of mounting /var/run/docker.sock directly,
  # so a compromised hypervisor cannot run docker exec, pull images, etc.
  docker-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.4.2
    container_name: arca-docker-proxy
    environment:
      # Allow only container restart; everything else defaults to 0 (denied).
      CONTAINERS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    # No external port — only accessible inside the Docker network.

  hypervisor:
    # Build context is project root so data/ and config/ are reachable.
    # hypervisor/main.py imports from data.feeds.market_data at runtime —
    # that module lives outside ./hypervisor so ./hypervisor alone is wrong.
    build:
      context: .
      dockerfile: hypervisor/Dockerfile
    container_name: arca-hypervisor
    depends_on:
      ollama:
        condition: service_started
      docker-proxy:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data/db:/app/data/db
      # Writable .env so /setup/credentials can persist credentials
      - ./.env:/app/.env
    environment:
      DOCKER_PROXY_URL: "http://docker-proxy:2375"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build: ./dashboard
    container_name: arca-dashboard
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker-nautilus:
    build:
      context: .
      dockerfile: workers/nautilus/Dockerfile
    container_name: arca-nautilus
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-prediction-markets:
    build: ./workers/prediction_markets
    container_name: arca-prediction-markets
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8002:8002"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-analyst:
    build: ./workers/analyst
    container_name: arca-analyst
    depends_on:
      # service_started not service_healthy — analyst handles Ollama
      # connection failure gracefully (stub mode, advisory_only=True).
      ollama:
        condition: service_started
    ports:
      - "8003:8003"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-telegram-bot:
    build: ./workers/telegram_bot
    container_name: arca-telegram-bot
    depends_on:
      hypervisor:
        condition: service_healthy
    environment:
      HYPERVISOR_URL: "http://hypervisor:8000"
    env_file: .env
    restart: unless-stopped

  worker-core-dividends:
    build: ./workers/core_dividends
    container_name: arca-core-dividends
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8006:8006"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  searxng:
    image: searxng/searxng:2026.4.17-e8299a4c3
    container_name: arca-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ollama_data:
