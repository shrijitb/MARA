system:
  mode: backtest
  heartbeat_sec: 30
  signal_ttl_sec: 300
  max_drawdown_pct: 0.15        # halt all trading at 15% portfolio drawdown
  max_single_position_pct: 0.10
  kelly_fraction: 0.25           # quarter-Kelly conservative sizing

data:
  tickers:
    bdi: "BDRY"                  # BDRY ETF as BDI proxy (^BDI delisted from yfinance)
    vix: "^VIX"
    dxy: "UUP"                   # UUP ETF as DXY proxy (DX=F unreliable)
    yield_curve_fred: "T10Y2Y"
    gold: "GC=F"
    oil: "CL=F"
    silver: "SI=F"
    copper: "HG=F"
    natgas: "NG=F"
  etfs:
    core: [VOO, VT, BND]
    commodities: [GLDM, BWET, SLVR, SILJ, GOEX]
    defense: [NATO, SHLD, PPA, ITA]
    resources: [REMX]
  crypto:
    funding_symbols: [BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP]
    ohlcv_pairs: ["BTC/USDT", "ETH/USDT", "SOL/USDT"]

workers:
  nautilus:
    enabled: true
    port: 8001
    base_allocation: 0.44
  prediction_markets:
    enabled: true
    port: 8002
    base_allocation: 0.12
    signal_only: true             # no auto-execution until Phase 3
  analyst:
    enabled: true
    port: 8003
    base_allocation: 0.08
    advisory_only: true           # never directly triggers orders
  core_dividends:
    enabled: true
    port: 8006
    base_allocation: 0.36
