# config/allocations.yaml
# Per-state capital allocation weights across all workers.
# Source of truth is hypervisor/allocator/capital.py ALLOCATION_PROFILES.
# This file is documentation only — allocator reads from capital.py directly.
# Values are fractions (must sum to 1.0 per state).

states:

  RISK_ON:
    nautilus:             0.44   # Max swing allocation in bullish conditions
    prediction_markets:   0.12   # Active markets in euphoria
    analyst:              0.08   # Advisory-only AI layer
    core_dividends:       0.36   # Strong passive allocation in risk-on

  RISK_OFF:
    nautilus:             0.34   # Reduced directional exposure
    prediction_markets:   0.18   # Elevated vol = wider spreads = better edge
    analyst:              0.08   # Advisory layer
    core_dividends:       0.40   # Defensive tilt to passive

  CRISIS:
    nautilus:             0.10   # Minimal directional — keep stops tight
    prediction_markets:   0.20   # Binary markets still function in panic
    analyst:              0.00   # Advisory paused — uncertainty too high
    core_dividends:       0.30   # Hold passive; remainder in cash

  TRANSITION:
    nautilus:             0.32   # Reduced until regime stabilises
    prediction_markets:   0.16   # Uncertainty = good market-making conditions
    analyst:              0.08   # Advisory layer
    core_dividends:       0.44   # Defensive passive tilt

# Max deploy fractions per state (remainder stays in cash)
max_deploy:
  RISK_ON:    0.80
  RISK_OFF:   0.75
  CRISIS:     0.50
  TRANSITION: 0.70
