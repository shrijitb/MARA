# config/regimes.yaml
# HMM regime classifier configuration.
# The 4-state HMM (RISK_ON, RISK_OFF, CRISIS, TRANSITION) is trained on
# market features and does not use threshold rules.
#
# Circuit breaker overrides (applied post-HMM):
circuit_breakers:
  # Force CRISIS state when VIX exceeds this level
  vix_crisis_threshold: 45.0
  # Force RISK_OFF when war premium score exceeds this level
  war_premium_crisis: 60.0
  # Minimum war premium score to activate war premium circuit breaker
  war_premium_floor: 25.0

# HMM model state labels (order must match model_state/hmm_4state.pkl)
hmm_states:
  - RISK_ON
  - RISK_OFF
  - CRISIS
  - TRANSITION

# Monthly retrain schedule
retrain:
  day: 1
  hour: 3
  minute: 0
