name: PR Check

on:
  pull_request:
    branches: [main, main]

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select E,F,W --ignore E501

  # ── 2. Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

      - name: Fail on test errors
        if: failure()
        run: |
          echo "Test suite failed. 0 failures is the gate (skips are acceptable)."
          exit 1
