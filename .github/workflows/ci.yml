name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, main]

jobs:
  # ── 1. Python test suite ──────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --junitxml=results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: results.xml

      - name: Fail on test errors
        if: failure()
        run: |
          echo "Test suite failed. 0 failures is the gate (skips are acceptable)."
          exit 1

  # ── 2. Build multi-arch images ────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arca-hypervisor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hypervisor/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-hypervisor:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-hypervisor:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-dashboard:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-nautilus
        uses: docker/build-push-action@v6
        with:
          context: ./workers/nautilus
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-nautilus:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-nautilus:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-prediction-markets
        uses: docker/build-push-action@v6
        with:
          context: ./workers/prediction_markets
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-prediction-markets:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-prediction-markets:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-analyst
        uses: docker/build-push-action@v6
        with:
          context: ./workers/analyst
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-analyst:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-analyst:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-core-dividends
        uses: docker/build-push-action@v6
        with:
          context: ./workers/core_dividends
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-core-dividends:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-core-dividends:${{ steps.vars.outputs.sha_short }}

      - name: Build and push arca-telegram-bot
        uses: docker/build-push-action@v6
        with:
          context: ./workers/telegram_bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arca-telegram-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/arca-telegram-bot:${{ steps.vars.outputs.sha_short }}

      # NOTE: arca-stocksharp is Phase 3 only — not built here.
      # NOTE: arca-ollama and arca-searxng use upstream images — not built here.

  # ── 3. Deploy to Raspberry Pi (on version tags only) ─────────────────────────
  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set tag name
        id: vars
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd ~/mara
            git pull origin main
            docker compose pull
            docker compose up -d
            sleep 30
            curl -sf http://localhost:8000/health || (docker compose logs --tail=50 hypervisor && exit 1)

      - name: Notify Telegram on success
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALLOWED_USER_ID }}" \
            -d text="Arca Pi deploy succeeded: ${{ steps.vars.outputs.tag_name }}"
