name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --junitxml=results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: results.xml

      - name: Check exit code
        if: failure()
        run: |
          echo "Test suite failed. 0 failures is the gate (19 skips are acceptable)."
          exit 1

  # ── 2. Build multi-arch images ───────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push mara-hypervisor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hypervisor/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-hypervisor:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-hypervisor:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-nautilus
        uses: docker/build-push-action@v6
        with:
          context: ./workers/nautilus
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-nautilus:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-nautilus:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-polymarket
        uses: docker/build-push-action@v6
        with:
          context: ./workers/polymarket
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-polymarket:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-polymarket:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-analyst
        uses: docker/build-push-action@v6
        with:
          context: ./workers/analyst
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-analyst:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-analyst:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-arbitrader
        uses: docker/build-push-action@v6
        with:
          context: ./workers/arbitrader
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-arbitrader:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-arbitrader:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-core-dividends
        uses: docker/build-push-action@v6
        with:
          context: ./workers/core_dividends
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-core-dividends:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-core-dividends:${{ steps.vars.outputs.sha_short }}

      - name: Build and push mara-telegram-bot
        uses: docker/build-push-action@v6
        with:
          context: ./workers/telegram_bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mara-telegram-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/mara-telegram-bot:${{ steps.vars.outputs.sha_short }}
      # NOTE: mara-stocksharp is Phase 3 only — not built here.
      # NOTE: mara-ollama uses upstream ollama/ollama image — not built here.

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/mara
            git pull origin main
            docker compose pull
            docker compose up -d
            sleep 15
            curl -sf http://localhost:8000/health || (docker compose logs --tail=50 hypervisor && exit 1)

      - name: Notify Telegram on success
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALLOWED_USER_ID }}" \
            -d text="MARA VPS deploy succeeded: ${{ steps.vars.outputs.sha_short }}"

  # ── 4. Deploy to Pi ───────────────────────────────────────────────────────────
  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set tag name
        id: vars
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd ~/mara
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.pi.yml pull
            docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d
            sleep 30
            curl -sf http://localhost:8000/health || (docker compose -f docker-compose.yml -f docker-compose.pi.yml logs --tail=50 hypervisor && exit 1)

      - name: Notify Telegram on success
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALLOWED_USER_ID }}" \
            -d text="MARA Pi deploy succeeded: ${{ steps.vars.outputs.tag_name }}"
