# Serves the static Arca build for always-on display use (any screen/browser).
# No API proxy — the React app resolves the hypervisor URL from localStorage
# (set during ConnectionGate) and calls it directly over the network.
server {
    listen 3000;
    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for immutable hashed assets
    location ~* \.(js|css|woff2|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
